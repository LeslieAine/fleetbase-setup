version: '3.8'

# ─────────────────────────────────────────────────────────────
# YOUR COURIER NETWORK — Full Fleetbase Stack
# Run: docker-compose up -d
# ─────────────────────────────────────────────────────────────

services:

  # ── Core API (Laravel) ────────────────────────────────────
  application:
    image: fleetbase/fleetbase:latest
    container_name: fleetbase-application
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./extensions:/app/packages/extensions
      - ./config/fleetbase.php:/app/config/fleetbase.php
      - ./config/commission.php:/app/config/commission.php
      - fleetbase-storage:/app/storage
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "${APP_NAME:-YourCourierNetwork}"
      APP_ENV: "${APP_ENV:-local}"
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "${APP_DEBUG:-true}"
      APP_URL: "${APP_URL:-http://localhost:8000}"
      DB_CONNECTION: mysql
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-fleetbase}"
      DB_USERNAME: "${DB_USERNAME:-fleetbase}"
      DB_PASSWORD: "${DB_PASSWORD:-secret}"
      REDIS_HOST: cache
      REDIS_PORT: 6379
      BROADCAST_DRIVER: pusher
      PUSHER_APP_ID: "${PUSHER_APP_ID}"
      PUSHER_APP_KEY: "${PUSHER_APP_KEY}"
      PUSHER_APP_SECRET: "${PUSHER_APP_SECRET}"
      PUSHER_HOST: socketio
      PUSHER_PORT: 6001
      PUSHER_SCHEME: http
      QUEUE_CONNECTION: redis
      MAIL_MAILER: "${MAIL_MAILER:-log}"
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS:-noreply@yourdomain.com}"
      MAIL_FROM_NAME: "${APP_NAME:-YourCourierNetwork}"
      # Custom extensions
      PLATFORM_COMMISSION_PERCENTAGE: "${PLATFORM_COMMISSION_PERCENTAGE:-7}"
      MAX_PACKAGES_PER_RIDER: "${MAX_PACKAGES_PER_RIDER:-3}"
      NEARBY_PICKUP_RADIUS_KM: "${NEARBY_PICKUP_RADIUS_KM:-2}"
      MEDUSA_BACKEND_URL: "${MEDUSA_BACKEND_URL:-http://host.docker.internal:9000}"
      MEDUSA_WEBHOOK_SECRET: "${MEDUSA_WEBHOOK_SECRET}"
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - fleetbase-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Queue Worker ──────────────────────────────────────────
  worker:
    image: fleetbase/fleetbase:latest
    container_name: fleetbase-worker
    restart: unless-stopped
    working_dir: /app
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    volumes:
      - ./extensions:/app/packages/extensions
      - fleetbase-storage:/app/storage
    environment:
      APP_KEY: "${APP_KEY}"
      DB_HOST: database
      DB_DATABASE: "${DB_DATABASE:-fleetbase}"
      DB_USERNAME: "${DB_USERNAME:-fleetbase}"
      DB_PASSWORD: "${DB_PASSWORD:-secret}"
      REDIS_HOST: cache
      QUEUE_CONNECTION: redis
      MEDUSA_BACKEND_URL: "${MEDUSA_BACKEND_URL:-http://host.docker.internal:9000}"
      MEDUSA_WEBHOOK_SECRET: "${MEDUSA_WEBHOOK_SECRET}"
    depends_on:
      - application
    networks:
      - fleetbase-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Scheduler (cron) ──────────────────────────────────────
  scheduler:
    image: fleetbase/fleetbase:latest
    container_name: fleetbase-scheduler
    restart: unless-stopped
    working_dir: /app
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    volumes:
      - ./extensions:/app/packages/extensions
      - fleetbase-storage:/app/storage
    environment:
      APP_KEY: "${APP_KEY}"
      DB_HOST: database
      DB_DATABASE: "${DB_DATABASE:-fleetbase}"
      DB_USERNAME: "${DB_USERNAME:-fleetbase}"
      DB_PASSWORD: "${DB_PASSWORD:-secret}"
      REDIS_HOST: cache
    depends_on:
      - application
    networks:
      - fleetbase-network

  # ── Console (Ember.js frontend) ───────────────────────────
  console:
    image: fleetbase/console:latest
    container_name: fleetbase-console
    restart: unless-stopped
    ports:
      - "4200:80"
    environment:
      API_HOST: "http://localhost:8000"
      SOCKET_HOST: "http://localhost:6001"
    depends_on:
      - application
    networks:
      - fleetbase-network

  # ── Socket.IO (real-time) ─────────────────────────────────
  socketio:
    image: fleetbase/socketcluster:latest
    container_name: fleetbase-socketio
    restart: unless-stopped
    ports:
      - "6001:6001"
    environment:
      SOCKETCLUSTER_PORT: 6001
    networks:
      - fleetbase-network

  # ── MySQL Database ────────────────────────────────────────
  database:
    image: mysql:8.0
    container_name: fleetbase-database
    restart: unless-stopped
    ports:
      - "3309:3306"  # 3309 to avoid conflict with your Medusa MySQL
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-fleetbase}"
      MYSQL_USER: "${DB_USERNAME:-fleetbase}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-rootsecret}"
    volumes:
      - fleetbase-mysql:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fleetbase-network

  # ── Redis Cache ───────────────────────────────────────────
  cache:
    image: redis:7-alpine
    container_name: fleetbase-cache
    restart: unless-stopped
    ports:
      - "6380:6379"  # 6380 to avoid conflict
    volumes:
      - fleetbase-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - fleetbase-network

# ── Volumes ────────────────────────────────────────────────
volumes:
  fleetbase-mysql:
  fleetbase-redis:
  fleetbase-storage:

# ── Network ────────────────────────────────────────────────
networks:
  fleetbase-network:
    driver: bridge
